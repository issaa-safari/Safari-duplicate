# Copy to config.yaml and edit. Non-secret settings only — secrets live in .env.

ingestion:
  # File extensions treated as videos when scanning sources.
  video_extensions: [".mp4", ".mov", ".mkv", ".avi", ".m4v", ".webm"]

  telegram:
    enabled: true
    # Which chats/channels to pull videos from. Each entry can be:
    #   - a numeric chat id            (e.g. -1001234567890)
    #   - a @username                  (e.g. "@my_safari_channel")
    #   - a phone-contact / title text Telethon can resolve
    watch:
      - "@my_safari_channel"
      # - -1001234567890
    # Only download messages newer than this many days on the first run
    # (prevents pulling a channel's entire history). 0 = no limit.
    lookback_days: 30

  onedrive:
    enabled: true
    # Name of the rclone remote you configured for OneDrive (see README).
    remote: "onedrive"
    # Folder inside that remote to sync FROM (use "" for the drive root).
    path: "SafariVideos"

# Stage 2 — analysis. Most tour footage is b-roll (no narration), so keyframes
# and scene cuts are the primary signal; speech transcription is optional.
analysis:
  # Grab one keyframe every N seconds (these are what Claude "sees" at Stage 3).
  keyframe_interval_seconds: 5
  # JPEG quality for keyframes (2 = high, 31 = low).
  keyframe_quality: 3

  # Shot/scene detection: finds cuts so we get candidate segments to keep.
  # 0.0-1.0; LOWER finds more cuts. ~0.3-0.4 suits typical footage.
  scene_threshold: 0.35

  speech:
    # Turn OFF entirely if your videos never have narration — skips Whisper,
    # much faster. Leave ON to auto-transcribe the occasional talking clip.
    enabled: true
    # faster-whisper model: tiny / base / small / medium / large-v3
    whisper_model: "base"
    # Force a language ("en", "sw", "ar", ...) or null to auto-detect.
    language: null
    device: "cpu"          # "cuda" only on a GPU box
    compute_type: "int8"   # "float16" on GPU
    # If detected speech covers less than this fraction of the video, treat it
    # as b-roll (no usable narration) and store an empty transcript.
    min_speech_coverage: 0.10

# Stage 4 — edit + export
export:
  crf: 20                       # H.264 quality (lower = better/bigger; 18-23 typical)
  voiceover:
    default_voice: "en-US-AriaNeural"   # any edge-tts voice; script.json can override
  music:
    default_gain_db: -18        # how far to duck music under the voiceover
    auto_pick: true             # if script has no track, pick a random assets/music file
  caption:
    # Auto-detected if omitted; set a .ttf path to force a specific font.
    font: null
    fontsize_ratio: 0.045       # caption size as a fraction of video height
    y_ratio: 0.80               # vertical position (0=top, 1=bottom)
    box_opacity: 0.5            # background box behind caption text

# Stage 5 — publish via Blotato. Nothing posts automatically: the pipeline only
# writes output/<name>/READY_TO_PUBLISH.md. You publish explicitly with:
#   ./publish <name>        (or:  python src/publish.py post <name>)
publish:
  # Which platforms to post to, and which exported format each one uses.
  # Only platforms that ALSO have text in script.json's post_captions are posted.
  # Comment out a platform to stop posting there.
  targets:
    instagram:
      format: "9x16"
      media_type: "reel"
    tiktok:
      format: "9x16"
      privacy_level: "PUBLIC_TO_EVERYONE"   # or SELF_ONLY while testing
      is_ai_generated: true                 # we add AI voiceover
    youtube:
      format: "16x9"
      privacy_status: "public"              # public | unlisted | private
    facebook:
      format: "9x16"
      media_type: "reel"
      # page_id: "123456789"                # required by FB; else taken from account
    # twitter: { format: "16x9" }
    # linkedin: { format: "16x9" }
